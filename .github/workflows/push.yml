---
name: Push
on:
  push:
    branches:
      - master
    tags-ignore:
      - '**'
env:
  REPONAME: uditgaurav
  IMAGE_NAME: go-runner
  IMAGE_TAG: ci
  DNAME: ${{ secrets.DNAME }}
  DPASS: ${{ secrets.DPASS }}

jobs:
  pre-checks:
    runs-on: ubuntu-latest
    steps:
      # Install golang
      - uses: actions/setup-go@v2
        with:
          go-version: 1.14
      - uses: actions/checkout@v2

      #TODO: Add Dockerfile linting
      # Running go-lint
      - name: Checking Go-Lint
        run : |
          sudo apt-get update && sudo apt-get install golint
          make gotasks

  push:
    needs: pre-checks
    runs-on: ubuntu-latest
    steps:

      # Install golang
      - uses: actions/setup-go@v2
        with:
          go-version: 1.14
      - uses: actions/checkout@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1
        with:
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v1
        with:
          version: latest

      - name: Docker login
        run: echo ${{ secrets.DPASS }} | docker login -u ${{ secrets.DNAME }} --password-stdin

      - name: Build & Push Docker Image
        env:
          DOCKER_REPO: ${REPONAME}
          DOCKER_IMAGE: ${IMAGE_NAME}
          DOCKER_TAG: ${IMAGE_TAG}
        run: make push

  trivy:
    needs: pre-checks
    runs-on: ubuntu-latest
    steps:
      # Install golang
      - uses: actions/setup-go@v2
        with:
          go-version: 1.14
      - uses: actions/checkout@v2

      - name: Build image for trivy scan
        run: make build-amd64

      - name: setup trivy
        run: |
          wget https://github.com/aquasecurity/trivy/releases/download/v0.11.0/trivy_0.11.0_Linux-64bit.tar.gz
          tar zxvf trivy_0.11.0_Linux-64bit.tar.gz
          make trivy-check
